repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
        # Fix the last lines' trailing whitespace before correcting that they exist.
      - id: trailing-whitespace
      - id: end-of-file-fixer

      - id: check-added-large-files
      - id: check-executables-have-shebangs
      - id: check-json
      - id: check-merge-conflict
      - id: check-shebang-scripts-are-executable
      - id: check-xml
      - id: check-yaml
      - id: fix-byte-order-marker
      - id: mixed-line-ending
      - id: no-commit-to-branch  # main
      - id: pretty-format-json
        args: [--autofix, --indent, '4']
  - repo: https://github.com/golangci/golangci-lint
    rev: v2.11.4
    hooks:
      # Note that this golangci-lint hook determines for itself what files have
      # changed, so running `pre-commit run golangci-lint --all-files` won't
      # work as you expect. They provide the `golangci-lint-full` hook for that.
      # To genuinely run golangci-lint against the whole project:
      #   * temporarily change the hook to `golangci-lint-full`, or
      #   * run the same version of golangci-lint outside of pre-commit
      - id: golangci-lint
        # Build the hook against the Go version we're using to avoid errors like
        # 'can't load config: the Go language version (go1.25) used to build
        # golangci-lint is lower than the targeted Go version (1.26.1)'.
        language_version: '1.26.1'
