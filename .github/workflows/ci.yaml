name: CI

on:
  pull_request:
  push:
    tags: [v*.*.*]
    branches: [main]

permissions:
  contents: write

jobs:
  Build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Lint
        uses: secondlife-3p/golangci-lint-action@v9
        with:
          args: --timeout=5m
          version: v2.11

      - name: Test
        run: |
          go mod tidy
          go test -v

      - name: Choose GoReleaser args
        shell: bash
        env:
          IS_TAG: ${{ startsWith(github.ref, 'refs/tags/v') }}
        id: goreleaser-args
        run: |
          if [[ "$IS_TAG" == "true" ]]
          then
            echo "Building for a tag: do a fully regular gorelease" >&2
            echo "value=" >> $GITHUB_OUTPUT
          else
            echo "Not building for a tag: do the gorelease in snapshot mode" >&2
            echo "value=--snapshot" >> $GITHUB_OUTPUT
          fi

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          args: release ${{ steps.goreleaser-args.outputs.value }}
          # The version of goreleaser to use.
          version: '~> v2'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
